spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/parking}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:parking}
    password: ${DB_PASSWORD:parking}
  jpa:
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  h2:
    console:
      enabled: false
  flyway:
    locations: classpath:db/migration

logging:
  level:
    com.parking: INFO
